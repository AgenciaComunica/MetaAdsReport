<div class="row g-3">
    <div class="col-md-3"><div class="kpi-card"><span class="kpi-label">Investimento <button type="button" class="kpi-help" data-bs-toggle="tooltip" data-bs-placement="top" title="Total investido em anúncios no período selecionado.">?</button></span><strong>R$ {{ kpis.investimento|default:0|floatformat:2 }}</strong></div></div>
    <div class="col-md-3"><div class="kpi-card"><span class="kpi-label">Impressões <button type="button" class="kpi-help" data-bs-toggle="tooltip" data-bs-placement="top" title="Quantidade total de vezes que os anúncios foram exibidos.">?</button></span><strong>{{ kpis.impressoes|default:0 }}</strong></div></div>
    <div class="col-md-3"><div class="kpi-card"><span class="kpi-label">Alcance <button type="button" class="kpi-help" data-bs-toggle="tooltip" data-bs-placement="top" title="Quantidade de pessoas únicas alcançadas pelos anúncios no período.">?</button></span><strong>{{ kpis.alcance|default:0 }}</strong></div></div>
    <div class="col-md-3"><div class="kpi-card"><span class="kpi-label">Resultados <button type="button" class="kpi-help" data-bs-toggle="tooltip" data-bs-placement="top" title="Total de resultados gerados, como leads, conversões ou outro objetivo configurado.">?</button></span><strong>{{ kpis.resultados|default:0|floatformat:2 }}</strong></div></div>
</div>
