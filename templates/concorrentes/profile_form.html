{% extends 'base.html' %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="panel mt-4 form-panel">
    <form method="post">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-4">{{ form.empresa.label_tag }}{{ form.empresa }}</div>
            <div class="col-md-4">{{ form.concorrente_nome.label_tag }}{{ form.concorrente_nome }}</div>
            <div class="col-md-4">{{ form.link.label_tag }}{{ form.link }}</div>
        </div>
        <button class="btn btn-dark mt-4" type="submit">Salvar</button>
    </form>
</div>
{% endblock %}
